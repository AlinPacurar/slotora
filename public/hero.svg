<svg viewBox="0 0 680 440" width="680" height="440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.018)} }
      @keyframes glow { 0%,100%{opacity:.45} 50%{opacity:.95} }
      @keyframes float1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
      @keyframes float2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
      @keyframes float3 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
      @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:1} }
      .breathe { animation: breathe 4s ease-in-out infinite; transform-origin: 340px 290px; }
      .glow-anim { animation: glow 3s ease-in-out infinite; }
      .float1 { animation: float1 3.4s ease-in-out infinite; }
      .float2 { animation: float2 2.9s ease-in-out infinite 0.2s; }
      .float3 { animation: float3 3.8s ease-in-out infinite 0.6s; }
    </style>
    <radialGradient id="bg2" cx="50%" cy="55%" r="65%">
