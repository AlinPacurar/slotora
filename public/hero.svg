      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowsm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
